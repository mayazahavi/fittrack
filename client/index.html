<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - FitTrack</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- קישור חזרה למסך הבית בפינה שמאלית עליונה -->
  <a href="index.html" class="back-home-link">
    <img src="images/backtohome.webp" alt="Back Home" class="home-icon" />
    <span>Back to Home</span>
  </a>

  <div class="login-wrapper">
    <form class="login-box" id="loginForm" autocomplete="off">
      <h2 class="login-heading">Welcome to FitTrack</h2>

      <img src="images/fittrack_icon.webp" alt="FitTrack Logo" class="login-logo" />

      <!-- Select role -->
      <select name="role" id="role" class="login-select">
        <option value="" disabled selected>Select Role</option>
        <option value="trainee">Trainee</option>
        <option value="coach">Coach</option>
      </select>
      <p class="error-msg" id="role-error"></p>

      <!-- Username -->
      <input type="text" id="username" placeholder="Username" />
      <p class="error-msg" id="username-error"></p>

      <!-- Password -->
      <input type="password" id="password" placeholder="Password" />
      <p class="error-msg" id="password-error"></p>

      <!-- Submit -->
      <button type="submit">Login</button>

      <a href="#" class="forgot-password">Forgot Password?</a>
    </form>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
