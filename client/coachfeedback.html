<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coach Feedback - FitTrack</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/feedback.css" />
  <link rel="stylesheet" href="css/coachfeedback.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Header -->
  <header>
    <section class="wrapper">
      <a href="index.html" class="logo-container">
        <img src="images/fittrack_icon.webp" alt="FitTrack logo" class="logo-img" />
        <span class="logo-text">FitTrack</span>
      </a>
      <nav class="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li class="dropdown">
            <a href="#" class="dropdown-toggle curr-page">Feedback</a>
            <ul class="dropdown-menu">
              <li><a href="coachdashboard.html">Dashboard</a></li>
              <li><a href="coachhistory.html">Feedback history</a></li>
            </ul>
          </li>
          <li><a href="coach_login.html">Logout</a></li>
        </ul>
      </nav>
    </section>
  </header>

  <!-- Main Content -->
  <main class="feedback-section">
    <section class="wrapper">
      <h2 class="feedback-title">Coach Feedback</h2>

      <section class="feedback-list">
        <section class="feedback-card">
          <label for="trainee-select">Select Trainee:</label>
          <select id="trainee-select" class="feedback-input">
            <option value="">Loading trainees...</option>
          </select>

          <!-- Last Trainee Entry Static Title -->
          <section id="trainee-message-box" class="trainee-message-box" aria-label="Last Trainee Entry">
            <h3 class="trainee-message-title">Last Trainee Entry</h3>
            <section id="trainee-message-content">
            </section>
          </section>
        </section>

        <section class="feedback-card">
          <label for="feedback-date">Select Date:</label>
          <input type="date" id="feedback-date" class="feedback-input">

          <label for="feedback-time" style="margin-top: 10px;">Select Time:</label>
          <input type="time" id="feedback-time" class="feedback-input">

          <label for="predefined-feedback" style="margin-top: 20px;">Predefined Feedback:</label>
          <select id="predefined-feedback" class="feedback-input">
            <option value="">-- Select Feedback --</option>
            <option value="Great progress, keep it up!">Great progress, keep it up!</option>
            <option value="Please pay attention to your technique.">Please pay attention to your technique.</option>
            <option value="Try to stay consistent with your workouts.">Try to stay consistent with your workouts.</option>
          </select>

          <label for="custom-feedback" style="margin-top: 20px; display: block;">Or write your own feedback:</label>
          <textarea id="custom-feedback" class="feedback-input" style="height: 150px;" placeholder="Write your feedback here..."></textarea>

          <button id="send-feedback-btn" class="btn" style="margin-top: 10px;">Send Feedback</button>
        </section>
      </section>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <section class="wrapper">
      <section class="footer-container">
        <section class="footer-group footer-left">
          <h3 class="footer-title">ABOUT</h3>
          <ul class="footer-links">
            <li><a href="#">Our Story</a></li>
            <li><a href="#">Team</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
          <section class="footer-icons">
            <a href="https://twitter.com" target="_blank"><img src="images/twitter.svg" alt="Twitter" class="social-icon" /></a>
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.svg" alt="Facebook" class="social-icon" /></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.svg" alt="Instagram" class="social-icon" /></a>
          </section>
          <p class="footer-copy">© 2025 FitTrack</p>
        </section>
        <section class="footer-group footer-right">
          <h3 class="footer-title">FOLLOW US</h3>
          <ul class="footer-links">
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Facebook</a></li>
            <li><a href="#">Instagram</a></li>
          </ul>
        </section>
      </section>
    </section>
  </footer>
  <script src="js/navbar-dropdown.js"></script>
  <script src="js/coachfeedback.js"></script>
</body>
</html>
