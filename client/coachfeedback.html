<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coach Feedback - FitTrack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/coachfeedback.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body style="font-family: 'Rubik', sans-serif; background-color: #f8f3ff;">

  <!-- ✅ HEADER -->
  <header>
    <nav class="navbar navbar-expand-lg custom-navbar">
      <section class="container d-flex justify-content-between align-items-center">
        <a href="index.html" class="navbar-brand d-flex align-items-center">
          <img src="images/fittrack_logo_darkgreen.png" alt="FitTrack Logo" width="64" height="64" class="me-2">
          <strong class="fs-4 text-dark">FitTrack</strong>
        </a>

        <nav class="d-flex align-items-center gap-3">
          <ul class="nav mb-0">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle active-link" href="#" id="dashboardDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Feedback
              </a>
              <ul class="dropdown-menu" aria-labelledby="dashboardDropdown">
                <li><a class="dropdown-item" href="coachdashboard.html">Dashboard</a></li>
                <li><a class="dropdown-item" href="coachhistory.html">View History</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a href="coach_login.html" class="btn btn-success px-4 ms-2">Logout</a>
            </li>
          </ul>
        </nav>
      </section>
    </nav>
  </header>

  <!-- ✅ MAIN CONTENT -->
  <main class="container my-5">
    <article class="container bg-info bg-opacity-25 rounded p-4 shadow-sm" style="max-width: 700px;">
      <h2 class="text-primary fw-bold mb-4 border-start border-5 border-primary ps-3">
        Coach Feedback Dashboard
      </h2>

      <form id="coachForm" autocomplete="off">
        <label for="date" class="form-label fw-semibold">Date</label>
        <input type="date" class="form-control rounded-pill" id="date" name="date" required />

        <label for="time" class="form-label fw-semibold mt-3">Time</label>
        <input type="time" class="form-control rounded-pill" id="time" name="time" required />

        <section class="d-flex align-items-center gap-2 mt-3">
          <div style="flex-grow:1;">
            <label for="traineeSelect" class="form-label fw-semibold">Select Trainee</label>
            <select id="traineeSelect" name="traineeSelect" class="form-select rounded-pill" required>
              <option value="" disabled selected>-- Select Trainee --</option>
            </select>
          </div>
          <button type="button" id="showTraineeDataBtn" class="btn btn-primary rounded-pill mt-4" data-bs-toggle="modal" data-bs-target="#traineeDataModal">
            Show Trainee Data
          </button>
        </section>

        <label for="tipNutrition" class="form-label fw-semibold mt-4">Nutrition Feedback</label>
        <textarea id="tipNutrition" name="tipNutrition" class="form-control rounded" placeholder="Feedback about meals and nutrition..." maxlength="300" rows="3"></textarea>

        <label for="tipExercise" class="form-label fw-semibold mt-3">Exercise Feedback</label>
        <textarea id="tipExercise" name="tipExercise" class="form-control rounded" placeholder="Feedback about exercise and training..." maxlength="300" rows="3"></textarea>

        <label for="tipGeneral" class="form-label fw-semibold mt-3">General Feedback</label>
        <textarea id="tipGeneral" name="tipGeneral" class="form-control rounded" placeholder="General feedback..." maxlength="300" rows="3"></textarea>

        <button type="submit" class="btn btn-primary w-100 rounded-pill mt-4">Send Feedback</button>
        <p id="form-error" class="text-danger mt-2"></p>
      </form>
    </article>
  </main>

  <!-- ✅ MODAL -->
  <section class="modal fade" id="traineeDataModal" tabindex="-1" aria-labelledby="traineeDataModalLabel" aria-hidden="true">
    <article class="modal-dialog modal-lg modal-dialog-centered">
      <section class="modal-content">
        <header class="modal-header">
          <h5 class="modal-title" id="traineeDataModalLabel">Trainee Data</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </header>
        <section class="modal-body" id="traineeDataModalContent">
          Loading...
        </section>
        <footer class="modal-footer">
          <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
        </footer>
      </section>
    </article>
  </section>

  <!-- ✅ FOOTER -->
  <footer id="contact" class="footer-section text-center text-white mt-5 py-4">
    <section class="mb-3">
      <a href="https://facebook.com" target="_blank"><img src="images/facebook.svg" alt="Facebook" width="24" class="mx-2 social-icon" /></a>
      <a href="https://instagram.com" target="_blank"><img src="images/instagram.svg" alt="Instagram" width="24" class="mx-2 social-icon" /></a>
      <a href="https://twitter.com" target="_blank"><img src="images/twitter.svg" alt="Twitter" width="24" class="mx-2 social-icon" /></a>
    </section>
    <small>© 2025 FitTrack, All rights reserved.</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/navbar-dropdown.js"></script>
  <script type="module" src="js/coachfeedback.js"></script>
</body>
</html>
