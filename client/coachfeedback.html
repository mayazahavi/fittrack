<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coach Feedback - FitTrack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/coachfeedback.css" />
  <link rel="stylesheet" href="css/navbar-dropdown.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header + Navigation -->
  <section class="wrapper">
    <header>
      <a href="index.html" class="logo-container">
        <img src="images/fittrack_icon.webp" alt="FitTrack logo" class="logo-img" />
        <span class="logo-text">FitTrack</span>
      </a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li class="dropdown">
            <a href="#" class="curr-page dropdown-toggle">Feedback</a>
            <ul class="dropdown-menu">
              <li><a href="coachdashboard.html">Dashboard</a></li>
              <li><a href="coachhistory.html">View History</a></li>
            </ul>
          </li>
          <li><a href="#">Logout</a></li>
        </ul>
      </nav>
    </header>
  </section>

  <!-- Main Content -->
  <main class="wrapper py-4">
    <article class="container bg-info bg-opacity-25 rounded p-4 shadow-sm" style="max-width: 700px;">
      <h2 class="text-primary fw-bold mb-4 border-start border-5 border-primary ps-3">
        Coach Feedback Dashboard
      </h2>

      <form id="coachForm" autocomplete="off">
        <label for="date" class="form-label fw-semibold">Date</label>
        <input type="date" class="form-control rounded-pill" id="date" name="date" required />

        <label for="time" class="form-label fw-semibold mt-3">Time</label>
        <input type="time" class="form-control rounded-pill" id="time" name="time" required />

        <section class="d-flex align-items-center gap-2 mt-3">
          <div style="flex-grow:1;">
            <label for="traineeSelect" class="form-label fw-semibold">Select Trainee</label>
            <select id="traineeSelect" name="traineeSelect" class="form-select rounded-pill" required>
              <option value="" disabled selected>-- Select Trainee --</option>
            </select>
          </div>
          <button type="button" id="showTraineeDataBtn" class="btn btn-primary rounded-pill mt-4" data-bs-toggle="modal" data-bs-target="#traineeDataModal">
            Show Trainee Data
          </button>
        </section>

        <label for="tipNutrition" class="form-label fw-semibold mt-4">Nutrition Feedback</label>
        <textarea id="tipNutrition" name="tipNutrition" class="form-control rounded" placeholder="Feedback about meals and nutrition..." maxlength="300" rows="3"></textarea>

        <label for="tipExercise" class="form-label fw-semibold mt-3">Exercise Feedback</label>
        <textarea id="tipExercise" name="tipExercise" class="form-control rounded" placeholder="Feedback about exercise and training..." maxlength="300" rows="3"></textarea>

        <label for="tipGeneral" class="form-label fw-semibold mt-3">General Feedback</label>
        <textarea id="tipGeneral" name="tipGeneral" class="form-control rounded" placeholder="General feedback..." maxlength="300" rows="3"></textarea>

        <button type="submit" class="btn btn-primary w-100 rounded-pill mt-4">Send Feedback</button>
        <p id="form-error" class="text-danger mt-2"></p>
      </form>
    </article>
  </main>

  <!-- Modal להצגת נתוני מתאמן -->
  <section class="modal fade" id="traineeDataModal" tabindex="-1" aria-labelledby="traineeDataModalLabel" aria-hidden="true">
    <article class="modal-dialog modal-lg modal-dialog-centered">
      <section class="modal-content">
        <header class="modal-header">
          <h5 class="modal-title" id="traineeDataModalLabel">Trainee Data</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </header>
        <section class="modal-body" id="traineeDataModalContent">
          Loading...
        </section>
        <footer class="modal-footer">
          <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
        </footer>
      </section>
    </article>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <section class="wrapper">
      <section class="footer-container">
        <section class="footer-group footer-left">
          <h3 class="footer-title">ABOUT</h3>
          <ul class="footer-links">
            <li><a href="#">Our Story</a></li>
            <li><a href="#">Team</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
          <section class="footer-icons">
            <a href="https://twitter.com" target="_blank"><img src="images/twitter.svg" alt="Twitter" class="social-icon" /></a>
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.svg" alt="Facebook" class="social-icon" /></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.svg" alt="Instagram" class="social-icon" /></a>
          </section>
          <p class="footer-copy">© 2025 FitTrack</p>
        </section>
        <section class="footer-group footer-right">
          <h3 class="footer-title">FOLLOW US</h3>
          <ul class="footer-links">
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Facebook</a></li>
            <li><a href="#">Instagram</a></li>
          </ul>
        </section>
      </section>
    </section>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/navbar-dropdown.js"></script>
  <script src="js/coachfeedback.js"></script>

</body>
</html>
